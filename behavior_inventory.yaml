# Behavior Inventory — Writ (FalkorDBLite fork)
#
# origin: design
# granularity: outcome
#
# ID prefix convention: <phase-slug>-NN.
#   Phase 1 (core storage swap) used decision IDs D1..D11 but defined NO
#   behavior-inventory prefix, so none is inherited. Phase 2 introduces the
#   prefix P2-INFRA (phase 2, infrastructure). Future phases pick their own
#   slug (e.g. P3-TEST).
#
# These are OUTCOME criteria: what "working correctly" looks like from the
# outside, independent of which implementation option is chosen. status:
# planned until Phase 2 ships; the implementer flips to active.

- id: P2-INFRA-01
  behavior: "Standalone bootstrap runs clean on macOS with no Docker installed"
  tier: phase
  phase: 2
  trigger: "bash scripts/bootstrap.sh"
  fixtures: []
  steps: "On a macOS machine with Docker NOT installed, run scripts/bootstrap.sh from the repo root."
  expected: "Exits 0; prints a 'Writ is ready' banner; never calls docker or references Neo4j; .writ/graph.db exists afterward."
  spec_ref: "docs/AI_artifacts/1_design/phase2-infra-cleanup.md §Success criteria"
  human_reviewed: no
  pytest_ref: null
  status: planned
  retired: null

